# Render Blueprint для email-proxy (Namo CRM)
# ────────────────────────────────────────────────────────────────
# Как задеплоить:
#   1. Зайдите на https://render.com своим аккаунтом
#   2. New → Blueprint → подключите этот GitHub-репозиторий
#   3. Render прочитает этот файл и всё настроит сам → нажмите "Apply"
#   4. Через ~2 минуты сервис поднимется, скопируйте его URL
#      (вида https://namo-email-proxy.onrender.com)
#
# Секрет PROXY_SECRET уже прописан ниже — он должен совпадать
# с EMAIL_PROXY_SECRET в проде CRM (я пропишу его туда сам).
# ────────────────────────────────────────────────────────────────

services:
  - type: web
    name: namo-email-proxy
    runtime: node
    plan: free              # бесплатный тариф Render (можно поменять на starter при нагрузке)
    region: frankfurt       # ближайший к РФ регион Render
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true        # автодеплой при пуше в main
    envVars:
      - key: PROXY_SECRET
        value: namo_proxy_3fe5af4cc2e4da9148bb05ca529d47789d7b5ad8d39fe763
      - key: NODE_VERSION
        value: "20"
