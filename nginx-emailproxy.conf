# nginx-конфиг для email-proxy.
# Разместить как /etc/nginx/sites-available/emailproxy и слинковать в sites-enabled.
# После этого выполнить: sudo certbot --nginx -d emailproxy.namospace.ru
# Certbot сам допишет listen 443 ssl + пути к сертификатам и редирект с 80 на 443.

server {
    listen 80;
    server_name emailproxy.namospace.ru;

    # Тело письма может быть крупным (вложения) — поднимаем лимит
    client_max_body_size 25M;

    location / {
        proxy_pass         http://127.0.0.1:3025;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # IMAP-опрос и SMTP-отправка могут занимать время — увеличенные таймауты
        proxy_connect_timeout 30s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }
}
